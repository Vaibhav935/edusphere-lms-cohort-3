<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin · EduSphere</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/store.js"></script>
<script>guardRequireAdmin();</script>
</head>
<body>

<nav class="navbar" id="navbar-mount"></nav>

<main class="section" style="padding-top:44px;">
  <div class="container">
    <div class="section-head">
      <div>
        <span class="eyebrow">Back office</span>
        <h1 style="font-size:1.9rem;">Course management</h1>
      </div>
      <button class="btn btn-primary" id="open-add-course-btn">+ Add new course</button>
    </div>

    <div class="card">
      <table>
        <thead><tr><th>Course</th><th>Category</th><th>Price</th><th>Lessons</th><th>Rating</th><th></th></tr></thead>
        <tbody id="admin-course-table"></tbody>
      </table>
    </div>
  </div>
</main>

<div class="modal-overlay" id="add-course-modal">
  <div class="card modal">
    <span class="modal-close" id="close-add-modal">✕</span>
    <span class="eyebrow">New course</span>
    <h3>Add a course to the catalog</h3>
    <form id="add-course-form">
      <div class="field"><label>Title</label><input type="text" id="new-title" required></div>
      <div class="field"><label>Category</label><input type="text" id="new-category" required placeholder="e.g. JavaScript"></div>
      <div class="field"><label>Price (₹)</label><input type="number" id="new-price" min="0" required></div>
      <div class="field"><label>Description</label><textarea id="new-description" rows="2" required></textarea></div>
      <div class="field"><label>Module 1 title</label><input type="text" id="new-module-title" required placeholder="Module 1 · Getting Started"></div>
      <div class="field"><label>Lesson 1 title</label><input type="text" id="new-lesson-title" required></div>
      <div class="field"><label>Lesson 1 content</label><textarea id="new-lesson-content" rows="2" required></textarea></div>
      <button type="submit" class="btn btn-primary btn-block">Create course</button>
    </form>
  </div>
</div>

<script src="js/main.js"></script>
<script src="js/admin.js"></script>
</body>
</html>
