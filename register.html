<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create Account · EduSphere</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/store.js"></script>
<script>guardRedirectIfLoggedIn();</script>
</head>
<body>

<nav class="navbar" id="navbar-mount"></nav>

<main class="section" style="padding-top:70px;">
  <div class="container" style="max-width:440px;">
    <div class="card">
      <span class="eyebrow">Join EduSphere</span>
      <h2>Create your account</h2>
      <form id="register-form" novalidate>
        <div class="field" id="field-username">
          <label for="username">Username</label>
          <input type="text" id="username" required minlength="3">
          <div class="field-error">That username is already taken.</div>
        </div>
        <div class="field" id="field-email">
          <label for="email">Email</label>
          <input type="email" id="email" required>
          <div class="field-error">Enter a valid, unused email address.</div>
        </div>
        <div class="field" id="field-password">
          <label for="password">Password</label>
          <input type="password" id="password" required>
          <div class="field-error">Min 8 characters, with at least 1 number and 1 special character.</div>
        </div>
        <div class="field" id="field-confirm">
          <label for="confirm">Confirm password</label>
          <input type="password" id="confirm" required>
          <div class="field-error">Passwords do not match.</div>
        </div>
        <button type="submit" class="btn btn-primary btn-block">Create account</button>
      </form>
      <p style="margin-top:16px; font-size:.85rem;">Already have an account? <a href="login.html" style="color:var(--accent-2);">Log in</a></p>
    </div>
  </div>
</main>

<script src="js/main.js"></script>
<script src="js/register.js"></script>
</body>
</html>
