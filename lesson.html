<!DOCTYPE html>
<html lang="en" data-theme="aurora">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Classroom · EduSphere</title>
<link rel="stylesheet" href="css/style.css">
<script src="js/store.js"></script>
<script>guardRequireAuth();</script>
</head>
<body>

<nav class="navbar" id="navbar-mount"></nav>

<main class="section" style="padding-top:40px;">
  <div class="container classroom-layout" id="classroom-root">
    <aside class="card">
      <span class="eyebrow" id="cl-course-title"></span>
      <div id="lesson-list"></div>
    </aside>

    <section>
      <div class="card">
        <h2 id="cl-lesson-title" style="font-size:1.4rem;"></h2>
        <div class="video-shell">
          <div class="play-ring">▶</div>
          <div class="timer-display" id="video-timer">00:00</div>
        </div>
        <p id="cl-lesson-content" style="margin-top:18px;"></p>
        <div style="display:flex; gap:12px; align-items:center;">
          <button class="btn btn-primary" id="mark-complete-btn" disabled>Mark as completed &amp; unlock next</button>
          <a href="quiz.html" id="go-to-quiz-link" class="btn btn-ghost">Take lesson quiz</a>
        </div>
      </div>
    </section>
  </div>
</main>

<script src="js/main.js"></script>
<script src="js/lesson.js"></script>
</body>
</html>
